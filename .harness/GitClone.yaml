pipeline:
  name: Git-Clone
  identifier: GitClone
  projectIdentifier: CI
  orgIdentifier: default
  tags:
    kartikeya: ""
  stages:
    - stage:
        name: Git-Clone
        identifier: GitClone
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: RunName
                  identifier: Run_1
                  spec:
                    connectorRef: account.harnessImage
                    image: harnesscommunity/harness-ccm-recommendation-automation
                    shell: Sh
                    command: file /usr/local/bin/python3
                    envVariables:
                      IMAGE_TAG: <+input>
                      case1: <+input>.default(abc).selectManyFrom(abc,def,geh)
                      case2: <+input>.default(test2).selectManyFrom(test1,test2,test3)
                  timeout: 1d 1h
          caching:
            enabled: false
            paths: []
          buildIntelligence:
            enabled: false
          sharedPaths:
            - /tmp/shared
            - /var/run
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: account.k8s
              namespace: kartikeya-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
        variables:
          - name: VERSION
            type: String
            description: ""
            required: false
            value: <+"0.0.1-"+<+pipeline.sequenceId>>
  variables:
    - name: test1
      type: String
      description: ""
      required: false
      value: test2
  allowStageExecutions: true
  properties:
    ci:
      codebase:
        connectorRef: account.GitHub
        repoName: CI-Usecases
        build: <+input>
        sparseCheckout: []

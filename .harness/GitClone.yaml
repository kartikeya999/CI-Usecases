pipeline:
  name: Git-Clone
  identifier: GitClone
  projectIdentifier: CI
  orgIdentifier: default
  tags:
    kartikeya: ""
  stages:
    - stage:
        name: Git-Clone
        identifier: GitClone
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  type: Run
                  name: RunName
                  identifier: Run_1
                  spec:
                    shell: Sh
                    command: |-
                      ls -la
                      tree /harness/
                    envVariables:
                      IMAGE_TAG: <+input>
                      case1: <+input>.default(abc).selectManyFrom(abc,def,geh)
                      case2: <+input>.default(test2).selectManyFrom(test1,test2,test3)
                  timeout: 1d 1h
          caching:
            enabled: false
            paths: []
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          sharedPaths:
            - /tmp/shared
            - /var/run
        variables:
          - name: VERSION
            type: String
            description: ""
            required: false
            value: <+"0.0.1-"+<+pipeline.sequenceId>>
    - stage:
        name: sparse
        identifier: sparse
        description: ""
        type: Custom
        spec:
          execution:
            steps:
              - stepGroup:
                  name: sparse
                  identifier: sparse
                  steps:
                    - step:
                        type: GitClone
                        name: GitClone_1
                        identifier: GitClone_1
                        spec:
                          connectorRef: account.GitHub
                          repoName: CI-Usecases
                          sparseCheckout:
                            - .harness
                          build:
                            type: branch
                            spec:
                              branch: main
                    - step:
                        type: Run
                        name: Run_1
                        identifier: Run_1
                        spec:
                          connectorRef: account.harnessImage
                          image: nginx
                          shell: Sh
                          command: |-
                            ls -la
                            ls -la /harness/CI-Usecases
                  stepGroupInfra:
                    type: KubernetesDirect
                    spec:
                      connectorRef: account.k8s
                      namespace: kartikeya-new
            rollbackSteps: []
          serviceDependencies: []
        tags: {}
  variables:
    - name: test1
      type: String
      description: ""
      required: false
      value: test2
  properties:
    ci:
      codebase:
        connectorRef: account.GitHub
        repoName: CI-usecases
        build: <+input>
        sparseCheckout:
          - .harness
  allowStageExecutions: true
